name: Release

on:
  release:
    types: [published]

jobs:
  # 각 플랫폼별 전용 독자 빌드 및 패키징 (Matrix 병렬 실행)
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Decrypt secret
        run: ./.github/scripts/decrypt_secret.sh
        shell: bash
        env:
          BUILD_KEY: ${{ secrets.BUILD_KEY }}
          BUILD_IV: ${{ secrets.BUILD_IV }}
          BUILD_PASS: ${{ secrets.BUILD_PASS }}

      # GitHub Release 태그명(예: v1.6.2)을 추출하여 package.json 버전에 실시간으로 자동 동기화 주입
      - name: Sync package.json version with Release Tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}" # v1.6.2 -> 1.6.2 변환
          echo "Syncing app version to: $VERSION"
          npm version $VERSION --no-git-tag-version
        shell: bash

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Packaging app
        run: npm run dist -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaging artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/TistoryEditor-*.dmg
            dist/TistoryEditor-*.exe
            dist/TistoryEditor-*.deb

  # 최종 아티팩트 취합 및 단일 릴리즈 등록
  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      # 모든 OS의 배포 바이너리들을 단일 dist 폴더로 통합 다운로드
      - name: Download all distributables
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      # 한 번에 전체 플랫폼 결과물을 안전하게 릴리즈 등록
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/TistoryEditor-*.exe
            dist/TistoryEditor-*.deb
            dist/TistoryEditor-*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


